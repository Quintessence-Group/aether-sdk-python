name: leak-scan
on: [push, pull_request]
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan tracked files for reverse-engineering / internal leaks
        run: |
          PATTERN='cosine|rerank|crates/aether-node|aether-node|aether monorepo|aether main|AET-[0-9]|tombstoned|token_balance|cluster_mode|\[0\.0\] ?\* ?[0-9]{3}'
          if git grep -nIE -i "$PATTERN" -- . ':(exclude).github/workflows/leak-scan.yml'; then
            echo "::error::leak-scan: forbidden internal/reverse-engineering token(s) found above."
            exit 1
          fi
          echo "leak-scan: clean"
