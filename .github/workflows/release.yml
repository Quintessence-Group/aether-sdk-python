name: Release

# Publishes aether-ai to PyPI using Trusted Publishing (OIDC).
# No long-lived API token is stored: PyPI verifies the GitHub OIDC token
# minted for this workflow run at publish time.
#
# Trigger:  git tag v<version> && git push origin v<version>
#           (the tag must match pyproject.toml's [project].version)
#
# Matches the pypi.org trusted-publishing policy:
#   project: aether-ai · repo: Quintessence-Group/aether-sdk-python
#   workflow: release.yml · environment: prod

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
      id-token: write # required for the PyPI Trusted Publishing OIDC exchange
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SDK + dev deps
        run: pip install -e ".[dev]"

      - name: Test
        run: pytest

      - name: Import check
        run: python -c "from aether.client import AetherClient; print('SDK import OK')"

      - name: Verify tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Install smoke from PyPI
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          python -m venv /tmp/smoke && . /tmp/smoke/bin/activate
          for attempt in 1 2 3 4 5; do
            if pip install "aether-ai==${TAG_VERSION}"; then break; fi
            [ "$attempt" = "5" ] && exit 1
            sleep 20
          done
          python -c "from aether.client import AetherClient; print('OK', AetherClient)"
